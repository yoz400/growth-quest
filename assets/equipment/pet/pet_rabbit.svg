  </defs>

  <!-- 地面の影 -->
  <ellipse cx="256" cy="466" rx="118" ry="18" fill="#0a0f18" opacity="0.22"/>

  <!-- 耳（左はピン、右はぺたんと垂れ気味。先っぽは朝焼け色） -->
  <g transform="rotate(-7 202 120)">
    <rect x="176" y="14" width="52" height="190" rx="26" fill="url(#rbEar)" stroke="#5c4a52" stroke-width="9"/>
    <rect x="190" y="44" width="24" height="128" rx="12" fill="#f9bccb"/>
  </g>
  <g transform="rotate(30 310 120)">
    <rect x="284" y="20" width="52" height="184" rx="26" fill="url(#rbEar)" stroke="#5c4a52" stroke-width="9"/>
    <rect x="298" y="48" width="24" height="124" rx="12" fill="#f9bccb"/>
  </g>

  <!-- まんまるボディ -->
  <path d="M256 96 C 176 96 140 178 136 264 C 132 354 186 440 256 440 C 326 440 380 354 376 264 C 372 178 336 96 256 96 Z"
        fill="url(#rbBody2)" stroke="#5c4a52" stroke-width="10"/>

