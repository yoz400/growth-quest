<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="rbBody2" cx="0.45" cy="0.25" r="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#eee2d2"/>
    </radialGradient>
    <linearGradient id="rbEar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb066"/>
      <stop offset="0.4" stop-color="#fffdf6"/>
      <stop offset="1" stop-color="#fffdf6"/>
