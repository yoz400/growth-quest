  <!-- 短い手 -->
  <ellipse cx="162" cy="334" rx="24" ry="36" fill="#fdfaf3" stroke="#5c4a52" stroke-width="9" transform="rotate(18 162 334)"/>
  <ellipse cx="350" cy="334" rx="24" ry="36" fill="#fdfaf3" stroke="#5c4a52" stroke-width="9" transform="rotate(-18 350 334)"/>

  <!-- 大きなあんよ -->
  <ellipse cx="198" cy="428" rx="40" ry="19" fill="#fdfaf3" stroke="#5c4a52" stroke-width="9"/>
  <ellipse cx="314" cy="428" rx="40" ry="19" fill="#fdfaf3" stroke="#5c4a52" stroke-width="9"/>

  <!-- うるうるの瞳 -->
  <ellipse cx="204" cy="230" rx="27" ry="33" fill="#322d3d"/>
  <ellipse cx="308" cy="230" rx="27" ry="33" fill="#322d3d"/>
  <circle cx="195" cy="218" r="10" fill="#fff"/>
  <circle cx="299" cy="218" r="10" fill="#fff"/>
  <circle cx="212" cy="239" r="4.5" fill="#fff" opacity="0.9"/>
  <circle cx="316" cy="239" r="4.5" fill="#fff" opacity="0.9"/>
  <circle cx="205" cy="247" r="6" fill="#6fa8e8" opacity="0.8"/>
  <circle cx="309" cy="247" r="6" fill="#6fa8e8" opacity="0.8"/>

  <!-- 鼻・あいた口・前歯 -->
  <path d="M248 272 Q256 266 264 272 Q256 282 248 272 Z" fill="#f3a0b8"/>
  <path d="M238 290 Q256 318 274 290 Z" fill="#8a4a58" stroke="#5c4a52" stroke-width="5" stroke-linejoin="round"/>
  <rect x="249" y="290" width="14" height="11" rx="3" fill="#fff"/>

